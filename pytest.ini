[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Markers
markers =
    smoke: fast smoke tests — run first
    negative: negative / validation scenarios
    happy: happy path scenarios
    slow: tests that take longer (e.g. dispatch, funnel start)

# Output
addopts =
    -v
    --tb=short
    --strict-markers

# Logging
log_cli = true
log_cli_level = INFO
